services:
  mysql:
    image: mysql:8.4
    container_name: fazenda-digital-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fazenda_digital
      MYSQL_USER: fazenda
      MYSQL_PASSWORD: fazenda
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - fazenda_digital_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  fazenda_digital_mysql:
